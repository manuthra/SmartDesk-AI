# Frontend Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: smartdesk-client
spec:
  replicas: 2
  selector:
    matchLabels:
      app: smartdesk-client
  template:
    metadata:
      labels:
        app: smartdesk-client
    spec:
      containers:
        - name: client
          image: smartdesk-client:latest
          ports:
            - containerPort: 3000
---
apiVersion: v1
kind: Service
metadata:
  name: smartdesk-client-service
spec:
  selector:
    app: smartdesk-client
  ports:
    - port: 3000
      targetPort: 3000
  type: ClusterIP
---
# Backend Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: smartdesk-server
spec:
  replicas: 2
  selector:
    matchLabels:
      app: smartdesk-server
  template:
    metadata:
      labels:
        app: smartdesk-server
    spec:
      containers:
        - name: server
          image: smartdesk-server:latest
          ports:
            - containerPort: 5000
          envFrom:
            - secretRef:
                name: smartdesk-secrets
---
apiVersion: v1
kind: Service
metadata:
  name: smartdesk-server-service
spec:
  selector:
    app: smartdesk-server
  ports:
    - port: 5000
      targetPort: 5000
  type: ClusterIP
---
# Ingress
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: smartdesk-ingress
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  rules:
    - http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: smartdesk-server-service
                port:
                  number: 5000
          - path: /
            pathType: Prefix
            backend:
              service:
                name: smartdesk-client-service
                port:
                  number: 3000
