name: SmartDesk CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: client/package-lock.json

      - name: Install client dependencies
        run: |
          cd client
          npm install

      - name: Lint client
        run: |
          cd client
          npm run lint || true

      - name: Build client
        run: |
          cd client
          npm run build

      - name: Install server dependencies
        run: |
          cd server
          npm install

      - name: Build Docker images
        run: |
          docker build -t smartdesk-client ./client
          docker build -t smartdesk-server ./server

      - name: Notify success
        run: echo "✅ Build successful!"
